version: '3'

services:
  users-service:
    build: ./users-service
    ports:
      - "3001:3001"

  products-service:
    build: ./products-service
    ports:
      - "3002:3002"

  orders-service:
    build: ./orders-service
    ports:
      - "3003:3003"

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    depends_on:
      - users-service
      - products-service
      - orders-service

  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "5050:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home

volumes:
  jenkins_home: